<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The Feed — A curated content aggregator pulling the latest from top news, local West LA, sports, Reddit, YouTube, and more.">
  <title>The Feed — Your Daily Content Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header" id="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <h1 class="site-title">
          <span class="title-icon">🗞️</span>
          The Feed
        </h1>
        <p class="site-tagline">Your daily content dashboard</p>
      </div>
      <div class="header-actions">
        <span class="last-updated" id="last-updated"></span>
        <button class="refresh-btn" id="refresh-btn" title="Refresh all feeds">
          <svg class="refresh-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
          <span>Refresh</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content" id="main-content">
    <!-- Loading State -->
    <div class="loading-state" id="loading-state">
      <div class="loading-spinner"></div>
      <p class="loading-text">Fetching the latest content…</p>
    </div>

    <!-- Error State -->
    <div class="error-state hidden" id="error-state">
      <p class="error-icon">⚠️</p>
      <p class="error-text">Something went wrong fetching feeds.</p>
      <button class="refresh-btn" onclick="loadFeed()">Try Again</button>
    </div>

    <!-- Feed Sections (populated by JS) -->
    <div class="feed-container hidden" id="feed-container"></div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <p>Content sourced from RSS feeds across the web. Links go to original articles.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
